apiVersion: v1alpha1
kind: Setting
metadata:
  name: watermark-settings
spec:
  forms:
    - group: basic
      label: Watermark Settings
      formSchema:
        - $formkit: checkbox
          name: enabled
          id: enabled
          key: enabled
          label: Enable Watermark
          help: "If enabled, all uploaded images will automatically be watermarked."
          value: true
        - $formkit: checkbox
          name: enableWebpConversion
          id: enableWebpConversion
          key: enableWebpConversion
          label: Convert to WebP
          help: "If enabled, images will be converted to WebP format after being watermarked. If it fails, it will fallback to original file."
          value: true
        - $formkit: text
          name: watermarkText
          id: watermarkText
          key: watermarkText
          label: Watermark Text
          help: "The text that will be displayed as a watermark on the image."
          value: "www.isiotak.com"
          validation: "required"
        - $formkit: radio
          name: fontSizeMode
          id: fontSizeMode
          key: fontSizeMode
          label: Font Size Mode
          help: "Choose whether the font size is calculated based on the image diagonal percentage or a fixed pixel value."
          value: "PERCENTAGE"
          options:
            - label: "Percentage (% of image diagonal)"
              value: "PERCENTAGE"
            - label: "Pixel (fixed px)"
              value: "PIXEL"
        - $formkit: number
          name: fontSize
          id: fontSize
          key: fontSize
          label: Font Size
          help: "If Percentage mode: value 1-20 (recommended 3-5). If Pixel mode: size in px (e.g., 24, 36, 48)."
          value: 4
          validation: "required|min:1|max:500"
          min: 1
          max: 500
          step: 0.5
        - $formkit: select
          name: position
          id: position
          key: position
          label: Watermark Position
          help: "The position of the watermark on the image."
          value: "BOTTOM_RIGHT"
          options:
            - label: "Top Left"
              value: "TOP_LEFT"
            - label: "Top Center"
              value: "TOP_CENTER"
            - label: "Top Right"
              value: "TOP_RIGHT"
            - label: "Center Left"
              value: "CENTER_LEFT"
            - label: "Center"
              value: "CENTER"
            - label: "Center Right"
              value: "CENTER_RIGHT"
            - label: "Bottom Left"
              value: "BOTTOM_LEFT"
            - label: "Bottom Center"
              value: "BOTTOM_CENTER"
            - label: "Bottom Right"
              value: "BOTTOM_RIGHT"
        - $formkit: number
          name: opacity
          id: opacity
          key: opacity
          label: "Opacity (%)"
          help: "Watermark transparency. 0 = fully transparent, 100 = fully opaque."
          value: 60
          validation: "required|min:0|max:100"
          min: 0
          max: 100
          step: 5
        - $formkit: number
          name: margin
          id: margin
          key: margin
          label: "Margin (%)"
          help: "The distance of the watermark from the image edge, as a percentage of the image diagonal."
          value: 2
          validation: "required|min:0|max:30"
          min: 0
          max: 30
          step: 0.5
        - $formkit: number
          name: quality
          id: quality
          key: quality
          label: "Output Quality (1-100)"
          help: "WebP/original file compression quality. Higher values mean larger file sizes."
          value: 80
          validation: "required|min:1|max:100"
          min: 1
          max: 100
          step: 5
        - $formkit: text
          name: fontFamily
          id: fontFamily
          key: fontFamily
          label: "Font Family"
          help: "The name of the font to use. Must be available on the server. Leave blank for default font (SansSerif)."
          value: "SansSerif"
        - $formkit: select
          name: fontStyle
          id: fontStyle
          key: fontStyle
          label: "Font Style"
          value: "BOLD"
          options:
            - label: "Normal"
              value: "PLAIN"
            - label: "Bold"
              value: "BOLD"
            - label: "Italic"
              value: "ITALIC"
            - label: "Bold Italic"
              value: "BOLD_ITALIC"
        - $formkit: text
          name: fontColor
          id: fontColor
          key: fontColor
          label: "Font Color (hex)"
          help: "Watermark color in hex format, e.g., #FFFFFF (white), #000000 (black)."
          value: "#FFFFFF"
        - $formkit: checkbox
          name: enableShadow
          id: enableShadow
          key: enableShadow
          label: "Enable Shadow"
          help: "Adds a shadow behind the watermark text to make it more readable across various backgrounds."
          value: true