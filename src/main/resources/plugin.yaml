apiVersion: plugin.halo.run/v1alpha1
kind: Plugin
metadata:
  name: halo-plugin-watermark
spec:
  enabled: true
  requires: ">=2.20.0"
  author:
    name: isiotak
    website: https://www.isiotak.com
  logo: https://raw.githubusercontent.com/manssizz/halo-plugin-watermark/main/logo.png
  settingName: watermark-settings
  configMapName: watermark-configMap
  homepage: https://github.com/manssizz/halo-plugin-watermark
  repo: https://github.com/manssizz/halo-plugin-watermark
  issues: https://github.com/manssizz/halo-plugin-watermark/issues
  displayName: "Image Watermark & WebP"
  description: "Otomatis menambahkan watermark dan konversi gambar ke WebP saat upload attachment."
